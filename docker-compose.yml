version: '3.8'

services:

  apache:
    build: ./apache
    container_name: apache-server
    ports:
      - "8080:80"
    depends_on:
      - app

  app:
    build: ./app
    container_name: tomcat-app
    expose:
      - "8080"
    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: fintech
      MYSQL_USER: user1
      MYSQL_PASSWORD: pass123
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
