version: '3.8'

services:

  app:
    build: .
    container_name: fintech-app
    ports:
      - "8080:8080"
    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: fintech-db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: fintech
      MYSQL_USER: user1
      MYSQL_PASSWORD: pass123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
